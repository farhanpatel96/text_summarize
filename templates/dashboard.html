<!DOCTYPE html>
<html>
<head>
<title>Dashboard - AI Tool</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->

<nav class="bg-blue-600 text-white px-8 py-4 flex justify-between">
<h2 class="text-xl font-bold">AI Dashboard</h2>
<a href="/logout" class="hover:underline">Logout</a>
</nav>

<div class="max-w-5xl mx-auto mt-10 space-y-6">

<!-- Input Card -->

<div class="bg-white p-6 rounded-xl shadow">

<h3 class="text-lg font-semibold mb-4">Enter Text</h3>

<form method="POST">

<textarea
name="text"
rows="6"
placeholder="Enter text here..."
required
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500"
></textarea>

<button
type="submit"
class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition"
>
Generate
</button>

</form>

</div>

{% if summary %}

<!-- Output Card -->

<div class="bg-white p-6 rounded-xl shadow">

<h3 class="text-lg font-semibold mb-2">Summary</h3>

<p class="text-gray-700 mb-4">{{summary}}</p>

<h3 class="text-lg font-semibold mb-2">Questions</h3>

<p class="text-gray-700">{{questions}}</p>

</div>

{% endif %}

<!-- History -->

<div class="bg-white p-6 rounded-xl shadow">

<h3 class="text-lg font-semibold mb-4">Previous Summaries</h3>

<ul class="space-y-2">

{% for item in history %}

<li class="bg-gray-100 p-3 rounded">
{{item.summary}}
</li>

{% endfor %}

</ul>

</div>

</div>

</body>
</html>
