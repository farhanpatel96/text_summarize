<!DOCTYPE html>
<html>
<head>
<title>Register - AI Tool</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="w-full max-w-md bg-white shadow-lg rounded-xl p-8">

<h2 class="text-2xl font-bold text-center mb-6">Create Account</h2>

<form method="POST" class="space-y-4">

<input 
type="text"
name="username"
placeholder="Username"
required
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500"
/>

<input
type="password"
name="password"
placeholder="Password"
required
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500"
/>

<button
type="submit"
class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition"
>
Register
</button>

</form>

<p class="text-center mt-4 text-sm">
Already have an account?
<a href="/" class="text-blue-600 font-semibold">Login</a>
</p>

</div>

</body>
</html>
